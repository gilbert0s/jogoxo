<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo da Velha Quadrado 6x6</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Jogo da Velha 6x6</h1>
    <div class="status" id="status">Sua vez! (Turno do X)</div>
    
    <div class="board">
        <div class="cell" data-index="0"></div><div class="cell" data-index="1"></div><div class="cell" data-index="2"></div><div class="cell" data-index="3"></div><div class="cell" data-index="4"></div><div class="cell" data-index="5"></div>
        <div class="cell" data-index="6"></div><div class="cell" data-index="7"></div><div class="cell" data-index="8"></div><div class="cell" data-index="9"></div><div class="cell" data-index="10"></div><div class="cell" data-index="11"></div>
        <div class="cell" data-index="12"></div><div class="cell" data-index="13"></div><div class="cell" data-index="14"></div><div class="cell" data-index="15"></div><div class="cell" data-index="16"></div><div class="cell" data-index="17"></div>
        <div class="cell" data-index="18"></div><div class="cell" data-index="19"></div><div class="cell" data-index="20"></div><div class="cell" data-index="21"></div><div class="cell" data-index="22"></div><div class="cell" data-index="23"></div>
        <div class="cell" data-index="24"></div><div class="cell" data-index="25"></div><div class="cell" data-index="26"></div><div class="cell" data-index="27"></div><div class="cell" data-index="28"></div><div class="cell" data-index="29"></div>
        <div class="cell" data-index="30"></div><div class="cell" data-index="31"></div><div class="cell" data-index="32"></div><div class="cell" data-index="33"></div><div class="cell" data-index="34"></div><div class="cell" data-index="35"></div>
    </div>

    <button id="restart">Reiniciar Jogo</button>

    <script src="script.js"></script>
</body>
</html>
