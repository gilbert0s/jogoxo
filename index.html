<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogos XO | Portal Futurista</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="main-header">
        <div class="logo-box">
            <div class="logo-matrix-cruz">
                <span class="neon-cyan border-bottom border-right">X</span>
                <span class="neon-pink border-bottom">O</span>
                <span class="neon-pink border-right">O</span>
                <span class="neon-cyan">X</span>
            </div>
            <h1 class="logo-text-vazado">JOGOS</h1>
        </div>
    </header>

    <main class="portal-grid">
        
        <a href="./velha-neon/" class="game-square neon-border-cyan card-velha">
            <div class="game-thumbnail">
                <div class="thumb-grid">
                    <span>X</span><span>O</span><span></span>
                    <span></span><span>X</span><span></span>
                    <span>O</span><span></span><span>X</span>
                </div>
            </div>
            <div class="card-footer">
                <h3>Velha 6x6</h3>
            </div>
        </a>

        <div class="game-square neon-border-pink">
            <a href="./velha-3x3/" class="game-square neon-border-pink">
            <div class="game-preview">3x3</div>
            <div class="card-footer">
                <h3>Velha Clássico</h3>
            </div>
        </a>
        </div>

        <div class="game-square neon-border-cyan coming-soon">
            <div class="game-preview">?</div>
            <h3>Em Breve</h3>
        </div>

    </main>

</body>
</html>
